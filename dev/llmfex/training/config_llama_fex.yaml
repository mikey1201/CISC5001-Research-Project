# =============================================================================
# Llama 3.2 3B Fine-tuning Configuration for PDE Operator Prediction
# =============================================================================
# Based on: "From Equations to Insights: Unraveling Symbolic Structures in PDEs with LLMs"
# Paper Section 5.1 Experimental Setup
#
# Hardware: RTX 5070 Ti (16GB VRAM) + 32GB RAM + i7 14700K
# =============================================================================

# Model Settings
model:
  name: "meta-llama/Llama-3.2-3B"  # Base model (not instruct version)
  type: "decoder_only"  # Llama is decoder-only
  
  # Tokenizer settings (Paper Section 3.3)
  max_prompt_length: 256   # Input sequence max length
  max_target_length: 64    # Output operator sequence max length
  total_sequence_length: 320  # Total with buffer

# LoRA Configuration (Paper Section 5.1)
lora:
  rank: 16
  alpha: 32  # Scaling factor (paper uses alpha=32)
  dropout: 0.1
  # Target modules for Llama attention layers
  target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"
  bias: "none"

# Training Configuration
training:
  # Epochs (paper used 12, but convergence observed faster)
  num_epochs: 3
  
  # Batch settings optimized for 16GB VRAM
  # Paper used batch_size=32 on 8x A6000 (48GB each)
  # We use smaller batch with gradient accumulation
  batch_size: 4
  gradient_accumulation_steps: 8
  # Effective batch size = 4 × 8 = 32 (matches paper)
  
  # Optimizer (Paper Section 3.3)
  optimizer: "adamw_torch"
  learning_rate: 2.0e-4
  weight_decay: 0.01
  
  # Learning rate scheduler
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  
  # Gradient settings
  max_grad_norm: 1.0
  gradient_checkpointing: true  # Enable for memory savings
  
  # Precision (Paper used BF16 on A6000)
  bf16: true
  fp16: false
  
  # 4-bit quantization for memory efficiency
  quantization:
    load_in_4bit: true
    bnb_4bit_quant_type: "nf4"
    bnb_4bit_compute_dtype: "bfloat16"
    bnb_4bit_use_double_quant: true

# Data Settings
data:
  # Path to generated dataset
  train_path: "../data_generation/data/pde_dataset.json"
  
  # Validation split
  val_split: 0.05
  
  # Data format fields
  input_field: "input"   # Prompt field name
  target_field: "target" # Target field name

# Logging and Checkpoints
logging:
  output_dir: "./finetuned_model"
  run_name: "llama_fex_pde_v1"
  logging_steps: 50
  eval_steps: 500
  save_steps: 500
  save_total_limit: 3
  report_to: "none"  # Set to "wandb" for experiment tracking

# Hardware Settings
hardware:
  device: "cuda"
  num_gpus: 1
  dataloader_num_workers: 4
  dataloader_pin_memory: true

# =============================================================================
# Paper Reference Settings (for comparison)
# =============================================================================
# Paper Section 5.1 used:
# - 8x NVIDIA A6000 GPUs (48GB each)
# - Total batch size: 256 (32 per GPU)
# - 12 epochs
# - Learning rate: 2×10^-4
# - Weight decay: 0.01
# - LoRA rank: 16, alpha: 32, dropout: 0.1
# - BF16 mixed precision
# - 198,000 training samples
# 
# Our adaptation for single RTX 5070 Ti:
# - 1x RTX 5070 Ti (16GB VRAM)
# - Effective batch size: 32 (via gradient accumulation)
# - 3 epochs (sufficient for convergence)
# - Same learning rate and optimizer settings
# - 4-bit quantization for memory efficiency
# - Gradient checkpointing enabled
# =============================================================================
